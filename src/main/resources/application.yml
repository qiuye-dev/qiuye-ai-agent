spring:
  application:
    name: ye-ai-agent
    profiles:
      active: local
  ai:
    mcp:
      client:
        stdio:
          servers-configuration: classpath:mcp-servers.json
  data:
    redis:
      host: localhost
      port: 6379
      database: 1

server:
  port: 8123
  servlet:
    context-path: /api

# springdoc-openapi
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.qiuye.yeaiagent.controller

# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

